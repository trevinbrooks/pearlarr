# Sonarr connection and behavior. url and api_key are required only when a Sonarr run actually
# executes; a Radarr-only config still loads.
sonarr:
  # Base URL of the instance's web UI, e.g. http://localhost:8989 for Sonarr or
  # http://localhost:7878 for Radarr. Blank leaves this arr unconfigured and its runs are skipped.
  url:

  # API key of the instance, from Settings > General in its web UI. Blank leaves this arr
  # unconfigured and its runs are skipped.
  api_key:

  # Verify the instance's HTTPS certificate. Turn off only for a self-signed instance whose CA
  # cannot be trusted via the OS store or SSL_CERT_FILE.
  verify_ssl: true

  # Skip items the arr does not monitor. For Radarr this means unmonitored movies; for Sonarr,
  # unmonitored series or entries whose episodes are all unmonitored.
  ignore_unmonitored: false

  # qBittorrent category applied to torrents grabbed for this arr. Blank applies no category.
  torrent_category:

  # Skip movies that already exist in Radarr instead of also grabbing them on the Sonarr side.
  ignore_movies_in_radarr: false

# Radarr connection and behavior. url and api_key are required only when a Radarr run actually
# executes; a Sonarr-only config still loads.
radarr:
  # Base URL of the instance's web UI, e.g. http://localhost:8989 for Sonarr or
  # http://localhost:7878 for Radarr. Blank leaves this arr unconfigured and its runs are skipped.
  url:

  # API key of the instance, from Settings > General in its web UI. Blank leaves this arr
  # unconfigured and its runs are skipped.
  api_key:

  # Verify the instance's HTTPS certificate. Turn off only for a self-signed instance whose CA
  # cannot be trusted via the OS store or SSL_CERT_FILE.
  verify_ssl: true

  # Skip items the arr does not monitor. For Radarr this means unmonitored movies; for Sonarr,
  # unmonitored series or entries whose episodes are all unmonitored.
  ignore_unmonitored: false

  # qBittorrent category applied to torrents grabbed for this arr. Blank applies no category.
  torrent_category:

# qBittorrent connection. All of host, username, and password are needed to grab; leave any blank to
# run in preview mode (everything is reported, nothing is added).
qbittorrent:
  # WebUI address of qBittorrent, e.g. http://localhost:8080. Leave any of host, username, or
  # password blank to run in preview mode: runs report what they would grab, but nothing is added.
  host:

  # WebUI username. Blank switches to preview mode (see host).
  username:

  # WebUI password. Blank switches to preview mode (see host).
  password:

  # Tags applied to every torrent added. Blank applies no tags.
  tags:

  # Extra keyword arguments passed to the qbittorrent-api client. For example
  # VERIFY_WEBUI_CERTIFICATE: false for a WebUI behind a self-signed HTTPS certificate.
  options:

# SeaDex release-selection filters.
seadex:
  # What to do when a title's preferred release sits only on private trackers. Private releases are
  # never grabbed: SeaDex carries no download link for them, and no private-tracker auth is
  # supported.
  # Values:
  #   warn     - Warn and skip without caching, so the title is re-checked every run until a public
  #              release appears.
  #   fallback - Grab the entry's best public alternative instead; warn only when none exists at
  #              all.
  private_releases: warn

  # Prefer dual-audio releases; when off, prefer Japanese-audio releases.
  prefer_dual_audio: true

  # Prefer releases SeaDex marks as best.
  want_best: true

  # SeaDex release tags to skip, e.g. Dolby Vision or Deband Required. Empty skips none.
  ignore_tags:

  # Tracker names considered during release selection, case-insensitive. Empty or absent considers
  # every supported tracker. A listed tracker is not necessarily grabbable: private releases are
  # never downloaded, and grabs come only from the public trackers Pearlarr can parse.
  # Known: Nyaa, AnimeTosho, AniDex, RuTracker, AB, BeyondHD, PassThePopcorn, BroadcastTheNet,
  # HDBits, Blutopia, Aither, Other, OtherPrivate
  trackers:

  # AniList IDs never processed. Empty ignores none.
  ignore_anilist_ids:

  # Re-check entries even when SeaDex has not updated them since the last check.
  ignore_seadex_update_times: false

  # Match what is already downloaded by torrent hash instead of by release group name.
  use_torrent_hash_to_filter: false

# Waiting for grabbed torrents and Sonarr manual import. Sonarr only: a Radarr run ignores this
# group.
imports:
  # When, if ever, to wait for grabbed torrents to finish downloading and then drive Sonarr's
  # import.
  # Values:
  #   off      - Disabled: no waiting, no pending-import records, no manual import.
  #   deferred - Never block: record grabs and import the already-finished ones on a later run.
  #   blocking - Block at the end of the run (and on an early break) until downloads finish, then
  #              import.
  #   hybrid   - Reconcile deferred imports at run start, then a blocking pass at the end
  #              (recommended).
  wait_mode: 'off'

  # Seconds to wait per torrent for qBittorrent to finish downloading it.
  wait_timeout: 3600

  # Seconds to then wait for Sonarr to rescan and import the finished files.
  ready_timeout: 600

  # Seconds between polls of qBittorrent and the Sonarr queue while waiting.
  poll_interval: 30

  # Seconds between lightweight wait-screen refreshes (progress bars, speed, ETA) within each poll
  # interval. 0 disables the extra refreshes; rows then advance once per poll_interval while
  # spinners and timers still animate. A value at or above poll_interval behaves as disabled.
  progress_poll_interval: 5

  # How the import takes finished files into the library. auto lets Sonarr choose between moving and
  # copying (a still-seeding torrent is copied); move and copy force it. Forwarded to Sonarr
  # verbatim.
  # Values: auto / move / copy
  mode: auto

  # qBittorrent category applied to a torrent once its import is verified complete. Useful to give
  # finished torrents different seeding rules. Blank keeps the add-time category. Only applies when
  # wait_mode is not off.
  post_import_category:

  # Sonarr quality name, e.g. Bluray-2160p, filling the gaps when a file's quality cannot be
  # detected. Useful on a 4K instance. Blank adds no default; a name matching no Sonarr quality
  # definition is warned about and ignored.
  default_quality:

  # Languages tagged on files imported from dual-audio releases. An empty list falls back to the
  # default; a file is never imported with no language (Sonarr would read it as Unknown and could
  # re-grab it).
  # Default: [Japanese, English]
  languages_dual:

  # Languages tagged on files imported from single-audio releases. Empty falls back like
  # languages_dual.
  # Default: [Japanese]
  languages_single:

  # Days a pending import may wait for its download before its record is dropped.
  pending_max_age_days: 14

  # Target seconds between wait-progress digest lines on a non-interactive console (Docker, cron).
  digest_interval: 300

# Notification webhooks. Either, both, or neither may be set.
notifications:
  # Discord webhook URL grab notifications are posted to. Blank disables them.
  discord_url:

  # Webhook URL (ntfy, gotify, Home Assistant, ...) receiving the wait-pass summary. Blank disables
  # it.
  wait_webhook_url:

  # Send a notification when a wait pass completes. Absent, it turns on automatically whenever any
  # webhook URL is set; an explicit value wins.
  wait_notify:

# Scheduled-mode cadence (the default command, run scheduled).
schedule:
  # Hours between scheduled cycles.
  interval_hours: 6.0

# Rate limiting, caching, run caps, and logging.
advanced:
  # Seconds slept between API queries, as rate limiting. 0 disables the sleep.
  sleep_time: 2

  # Days downloaded mapping sources are kept before re-downloading. 0 re-downloads every run.
  cache_time: 1

  # Prompt for a choice when several torrents match, instead of taking the best automatically.
  interactive: false

  # Cap on torrents added per run. Blank means unlimited.
  max_torrents_to_add:

  # Re-check titles whose files Sonarr or Radarr changed since the last run. Polls each arr's
  # history at run start. Turn off if a release you replaced arr-side keeps being re-grabbed.
  detect_arr_activity: true

  # Minimum level written to the console and the file log, case-insensitive.
  # Values: DEBUG / INFO / WARNING / ERROR / CRITICAL
  log_level: INFO

  # Console output format. auto resolves to rich on a terminal and plain when piped or under Docker;
  # plain and json also disable the live progress views.
  # Values: auto / rich / plain / json
  log_format: auto

# ID and episode mapping sources. anibridge_mappings is the primary; the others fill anything it
# misses.
mappings:
  # Kometa Anime-IDs source, a fallback for IDs the primary graph misses. Blank auto-downloads it;
  # false disables it; an inline mapping is accepted.
  anime_mappings:

  # AniDB anime-lists XML source, a fallback used for specials. Blank auto-downloads it; false
  # disables it.
  anidb_mappings:

  # anibridge-mappings v3 graph, the primary source of IDs and per-season episode maps. Blank
  # auto-downloads it; false disables it; an inline mapping is accepted.
  anibridge_mappings:
