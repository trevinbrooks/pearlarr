[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "seadexarr"
version = "0.9.0"
description = "SeaDex Starr Sync"
readme = "README.md"
requires-python = ">=3.12"
license = "GPL-3.0-or-later"
license-files = ["LICENSE"]

authors = [
    {name = "bbtufty"},
]
maintainers = [
    {name = "bbtufty"},
]

keywords = [
    "anime",
    "radarr",
    "seadex",
    "sonarr",
    "torrent",
]

classifiers = [
    #   3 - Alpha
    #   4 - Beta
    #   5 - Production/Stable
    "Development Status :: 4 - Beta",

    "Environment :: Console",
    "Operating System :: OS Independent",

    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3 :: Only",
]

dependencies = [
    "arrapi == 1.4.14",
#    "basedpyright>=1.39.8",
    "beautifulsoup4 == 4.14.3",
    "discordwebhook == 1.0.3",
    "httpx == 0.28.1",
    "pynyaa == 3.0.0",
    "pyrefly>=0.60.0",
    "PyYAML == 6.0.3",
    "qbittorrent-api == 2025.11.1",
    "requests == 2.32.5",
    "rich == 13.9.4",
    "ruamel.yaml == 0.19.1",
    "seadex == 0.7.2",
    "typer == 0.21.1",
]

[project.optional-dependencies]
docs = [
    "sphinx-automodapi == 0.22.0",
    "sphinx-rtd-theme == 3.0.2",
]

[project.scripts]
seadexarr = "seadexarr:seadexarr_cli"

[project.urls]
Homepage = "https://github.com/bbtufty/seadexarr"
Repository = "https://github.com/bbtufty/seadexarr"
"Bug Reports" = "https://github.com/bbtufty/seadexarr/issues"

# Dev tooling lives in PEP 735 dependency-groups (read natively by uv and pip),
# so it never ships as a runtime extra. Install with e.g. `uv sync --group dev`.
[dependency-groups]
build = [
    "build",
    "hatchling>=1.27.0",
]
static-analysis = [
    "autopep8~=2.0",
    "ruff~=0.15.0",
]
test = [
    "pytest~=9.0",
]
dev = [
    "pre-commit",
    {include-group = "static-analysis"},
    {include-group = "test"},
]

# hatchling discovers config_sample.yml (and any other package data) under the
# package automatically, so no package-data wiring is needed.
[tool.hatch.build.targets.sdist]
include = [
    "/seadexarr",
    "/CHANGES.rst",
    "/LICENSE",
    "/README.md",
    "/pyproject.toml",
]

[tool.hatch.build.targets.wheel]
packages = ["seadexarr"]

# Point the type checkers at the project virtualenv so third-party imports
# resolve. Without it, Pyright/Pylance launched outside the repo root can't find
# .venv and flags every third-party import as unresolved. pyrefly reads these
# pyright-compatible settings too, so with the venv resolved it now surfaces a
# handful of pre-existing latent type errors (to be addressed separately).
[tool.pyright]
venvPath = "."
venv = ".venv"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
ignore = [
    "E402",    # module-import-not-at-top-of-file
    "E501",    # line-too-long
    "E731",    # lambda-assignment
    "E741",    # ambiguous-variable-name
    "UP031",   # printf-string-formatting
    "UP036",   # outdated-version-block
    "B006",    # mutable-argument-default
    "B008",    # function-call-in-default-argument
    "B011",    # assert-false
    "B017",    # assert-raises-exception
    "B023",    # function-uses-loop-variable (false positives)
    "B028",    # no-explicit-stacklevel
    "B904",    # raise-without-from-inside-except
    "A005",    # stdlib-module-shadowing
    "C401",    # unnecessary-generator-set
    "C402",    # unnecessary-generator-dict
    "PIE790",  # unnecessary-placeholder
    "SIM102",  # collapsible-if
    "SIM108",  # if-else-block-instead-of-if-exp
    "SIM112",  # uncapitalized-environment-variables
    "SIM113",  # enumerate-for-loop
    "SIM114",  # if-with-same-arms
    "SIM115",  # open-file-with-context-handler
    "SIM117",  # multiple-with-statements
    "SIM223",  # expr-and-false
    "SIM300",  # yoda-conditions
    "TD001",   # invalid-todo-tag
    "TD002",   # missing-todo-author
    "TD003",   # missing-todo-link
    "PLC0415", # import-outside-top-level
    "PLE0604", # invalid-all-object (false positives)
    "PLE0643", # potential-index-error (false positives)
    "PLW0603", # global-statement
    "PLW1510", # subprocess-run-without-check
    "PLW1641", # eq-without-hash
    "PLW2901", # redefined-loop-name
    "RUF001",  # ambiguous-unicode-character-string
    "RUF012",  # mutable-class-default
    "RUF100",  # unused-noqa (flake8 has slightly different behavior)
]
select = [
    "E",      # pycodestyle Error
    "W",      # pycodestyle Warning
    "F",      # Pyflakes
    "I",      # isort
    "Q",      # flake8-quotes
    "N803",   # invalid-argument-name
    "N804",   # invalid-first-argument-name-for-class-method
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "A",      # flake8-builtins
    "COM",    # flake8-commas
    "C4",     # flake8-comprehensions
    "FA",     # flake8-future-annotations
    "ISC",    # flake8-implicit-str-concat
    "ICN003", # banned-import-from
    "PIE",    # flake8-pie
    "T20",    # flake8-print
    "RSE",    # flake8-raise
    "RET504", # unnecessary-assign
    "SIM",    # flake8-simplify
    "TID251", # banned-api
    "TD",     # flake8-todos
    "PLC",    # Pylint Convention
    "PLE",    # Pylint Error
    "PLW",    # Pylint Warning
    "RUF",    # Ruff-specific rules
]

[tool.ruff.lint.isort]
known-first-party = [
    "seadexarr",
]
relative-imports-order = "closest-to-furthest"

# Adapted from yt-dlp's single-quote convention to the double quotes this
# project already uses (also ruff's default), so flake8-quotes stays enabled
# without rewriting every string literal.
[tool.ruff.lint.flake8-quotes]
docstring-quotes = "double"
multiline-quotes = "double"
inline-quotes = "double"
avoid-escape = false

[tool.autopep8]
max_line_length = 120
recursive = true
exit-code = true
jobs = 0
select = [
    "E101",
    "E112",
    "E113",
    "E115",
    "E116",
    "E117",
    "E121",
    "E122",
    "E123",
    "E124",
    "E125",
    "E126",
    "E127",
    "E128",
    "E129",
    "E131",
    "E201",
    "E202",
    "E203",
    "E211",
    "E221",
    "E222",
    "E223",
    "E224",
    "E225",
    "E226",
    "E227",
    "E228",
    "E231",
    "E241",
    "E242",
    "E251",
    "E252",
    "E261",
    "E262",
    "E265",
    "E266",
    "E271",
    "E272",
    "E273",
    "E274",
    "E275",
    "E301",
    "E302",
    "E303",
    "E304",
    "E305",
    "E306",
    "E502",
    "E701",
    "E702",
    "E704",
    "W391",
    "W504",
]
exclude = "*venv*,.idea,.vscode,build,docs/_build"
