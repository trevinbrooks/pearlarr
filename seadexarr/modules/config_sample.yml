# Parameters for Sonarr
sonarr_url:
sonarr_api_key:
sonarr_ignore_unmonitored: false  # If True, will not grab releases that are unmonitored in Sonarr
ignore_movies_in_radarr: false  # If True, will not add movies to Sonarr that already exist in Radarr

# Parameters for Radarr
radarr_url:
radarr_api_key:
radarr_ignore_unmonitored: false  # If True, will not grab releases that are unmonitored in Radarr

# qBittorrent parameters
qbit_info:
  host:
  username:
  password:

# Categories for added torrents
sonarr_torrent_category:
radarr_torrent_category:
torrent_tags:

# Ignore SeaDex update times?
ignore_seadex_update_times: false

# Do you want to filter purely by torrent hash?
use_torrent_hash_to_filter: false

# Maximum number of torrents to add in one run
max_torrents_to_add:

# Wait-for-completion + Sonarr manual import (Sonarr only; Radarr is a no-op)
# After a torrent is added, optionally wait for qBittorrent to finish it, then
# ask Sonarr to rescan (RefreshMonitoredDownloads) and watch its queue: let Sonarr
# import the files itself, and only step in with a series-pinned manual import
# (our authoritative mapping) when Sonarr can't auto-import them (importBlocked) or
# isn't tracking the download. import_wait_mode enables the feature; "off" disables
# it entirely (no waiting, no pending records, no manual import). Other modes
# control *when* it runs:
#   off       - disabled (default)
#   deferred  - never block; import already-complete downloads on a later run
#   blocking  - block at end of run (and on early-break) until complete, then import
#   hybrid    - recommended: deferred reconcile at start + blocking pass at end
import_wait_mode: "off"     # off (disabled) / deferred / blocking / hybrid
import_wait_timeout: 3600   # Seconds to wait per torrent for qBittorrent to finish
import_ready_timeout: 600   # Seconds to then wait for Sonarr to rescan + import
import_poll_interval: 30    # Seconds between polls (qBittorrent + Sonarr queue)
import_mode: auto           # Sonarr importMode: auto/move/copy
# Fallback quality when neither our parse nor Sonarr's is known (e.g. Bluray-2160p).
# Recommended on a 4K instance to avoid Unknown-quality re-grabs.
import_default_quality:
import_languages_dual:      # Languages for dual-audio releases (default: [Japanese, English])
import_languages_single:    # Languages for single-audio releases (default: [Japanese])
import_pending_max_age_days: 14  # Drop pending-import records older than this (TTL)

# Discord webhook URL
discord_url:

# SeaDex filters
public_only: true
prefer_dual_audio: true
want_best: true
ignore_tags:
trackers:

# AniList IDs to skip entirely. Provide a list of integer IDs that should never be processed
ignore_anilist_ids:

# Advanced settings
sleep_time: 2
cache_time: 1
interactive: false
# ID/episode mapping sources. Leave blank to auto-download, set to false to
# disable, or inline your own data. anibridge is the primary source; the others
# act as fallbacks for anything it doesn't cover.
anime_mappings:      # Kometa Anime-IDs (fallback)
anidb_mappings:      # AniDB anime-lists XML (fallback, used for specials)
anibridge_mappings:  # anibridge-mappings v3 graph (primary: IDs + per-season episode maps)
log_level: "INFO"
