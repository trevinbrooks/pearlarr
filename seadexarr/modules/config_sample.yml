# Sonarr connection + behaviour. url/api_key are required only when a Sonarr run
# actually executes (a Radarr-only config still loads fine).
sonarr:
  url:
  api_key:
  ignore_unmonitored: false        # If true, skip releases unmonitored in Sonarr
  torrent_category:                # qBittorrent category for Sonarr-added torrents
  ignore_movies_in_radarr: false   # If true, don't add movies to Sonarr that already exist in Radarr

# Radarr connection + behaviour. url/api_key are required only when a Radarr run runs.
radarr:
  url:
  api_key:
  ignore_unmonitored: false        # If true, skip releases unmonitored in Radarr
  torrent_category:                # qBittorrent category for Radarr-added torrents

# qBittorrent connection. All of host/username/password are needed to add torrents;
# leave any blank to run in preview-only mode (nothing is grabbed).
qbittorrent:
  host:
  username:
  password:
  tags:                            # Tags applied to every added torrent
  options:                         # Extra qbittorrentapi.Client kwargs, e.g. {VERIFY_WEBUI_CERTIFICATE: false} for a self-signed WebUI

# SeaDex release-selection filters
seadex:
  public_only: true                # Only return results from public trackers
  prefer_dual_audio: true          # Prefer dual-audio releases (else prefer Ja-only)
  want_best: true                  # Prefer releases tagged "best"
  ignore_tags:                     # SeaDex tags to skip (e.g. Dolby Vision, Deband Required)
  trackers:                        # Allowed trackers (default: all public + private)
  ignore_anilist_ids:              # AniList IDs to never process (a list of integer IDs)
  ignore_seadex_update_times: false   # If true, re-check entries even if SeaDex hasn't updated them
  use_torrent_hash_to_filter: false   # Filter by torrent hash (true) instead of release group (false)

# Wait-for-completion + Sonarr manual import (Sonarr only; Radarr is a no-op).
# After a torrent is added, optionally wait for qBittorrent to finish it, then ask
# Sonarr to rescan (RefreshMonitoredDownloads) and watch its queue: let Sonarr import
# the files itself, and only step in with a series-pinned manual import (our
# authoritative mapping) when Sonarr can't auto-import them (importBlocked) or isn't
# tracking the download. wait_mode enables the feature; "off" disables it entirely (no
# waiting, no pending records, no manual import). Other modes control *when* it runs:
#   off       - disabled (default)
#   deferred  - never block; import already-complete downloads on a later run
#   blocking  - block at end of run (and on early-break) until complete, then import
#   hybrid    - recommended: deferred reconcile at start + blocking pass at end
imports:
  wait_mode: "off"                 # off (disabled) / deferred / blocking / hybrid
  wait_timeout: 3600               # Seconds to wait per torrent for qBittorrent to finish
  ready_timeout: 600               # Seconds to then wait for Sonarr to rescan + import
  poll_interval: 30                # Seconds between polls (qBittorrent + Sonarr queue)
  progress_poll_interval: 5        # Seconds between cheap wait-screen refreshes (bars/speed; 0 disables)
  mode: auto                       # Sonarr importMode: auto/move/copy
  default_quality:                 # Fallback quality (e.g. Bluray-2160p) on a 4K instance
  languages_dual:                  # Languages for dual-audio releases (default: [Japanese, English])
  languages_single:                # Languages for single-audio releases (default: [Japanese])
  pending_max_age_days: 14         # Drop pending-import records older than this (TTL)
  digest_interval: 300             # Target seconds between wait digests on a non-TTY (Docker/cron)

# Notifications. Either, both, or neither may be set.
notifications:
  discord_url:                     # Discord webhook URL
  wait_webhook_url:                # Generic outbound webhook (ntfy/gotify/HA) for the wait summary
  wait_notify:                     # Push on wait-complete (default: on if any webhook is set)

# ID/episode mapping sources. Leave blank to auto-download, or set to false to disable.
# anibridge is the primary source; the others are fallbacks for anything it misses.
mappings:
  anime_mappings:                  # Kometa Anime-IDs (fallback)
  anidb_mappings:                  # AniDB anime-lists XML (fallback, used for specials)
  anibridge_mappings:              # anibridge-mappings v3 graph (primary: IDs + per-season episode maps)

# Advanced
advanced:
  sleep_time: 2                    # Seconds to sleep between API queries (rate limiting)
  cache_time: 1                    # Days to cache the downloaded mapping sources
  interactive: false               # Prompt when multiple torrent options match
  max_torrents_to_add:             # Cap torrents added per run (default: unlimited)
  log_level: "INFO"                # WARNING / INFO / DEBUG
