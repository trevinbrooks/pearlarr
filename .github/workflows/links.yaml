name: Links

# External-URL link check, weekly: link rot is a slow disease, and a flaky
# remote host must not block PRs (per-PR checking stays offline in build.yaml).
# While the repo is private this stays red on the public-only URLs (the PyPI
# project page, raw.githubusercontent); it self-heals at the public flip.
on:
  schedule:
    - cron: "37 4 * * 1"
  workflow_dispatch:

jobs:
  links:
    name: Check external links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Lychee (full, external URLs included)
        uses: lycheeverse/lychee-action@v2
        env:
          # Authenticates github.com link checks - avoids anonymous rate limits.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --include-fragments --no-progress './**/*.md'
          fail: true
