name: Build

on:
  push:
    branches:
      # '**' matches slash-named branches (feature/foo); a bare '*' does not.
      - '**'
  pull_request:
    branches:
      - main

jobs:
  checks:
    name: Checks (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Versions listed at https://raw.githubusercontent.com/actions/python-versions/main/versions-manifest.json
        python-version: [
          "3.13",
          "3.14",
        ]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
          # Full history so diff-cover can diff against the PR base branch.
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}
      - name: Ruff (lint)
        run: uv run ruff check pearlarr/ tests/
      - name: Ruff (format)
        run: uv run ruff format --check pearlarr/ tests/
      - name: Basedpyright (src + tests, strict)
        run: uv run basedpyright pearlarr tests
      # The type gate is vanilla pyright (pinned for reproducible CI). It reads
      # [tool.pyright] in pyproject.toml (typeCheckingMode = strict for BOTH the
      # package and tests/) and resolves imports against the .venv that `uv sync`
      # just created.
      - name: Pyright (type check, strict)
        run: uvx pyright@1.1.411 pearlarr tests
      - name: Pyrefly (type check)
        run: uv run pyrefly check pearlarr tests --preset strict
      # Branch coverage with the fail_under floor from [tool.coverage.report].
      - name: Pytest (with coverage gate)
        run: uv run pytest tests/ --cov=pearlarr --cov-report=term-missing --cov-report=xml
      # Changed-line coverage gate: diff against the PR base (base_ref on PRs,
      # main on branch pushes); skipped on main itself, which has no base to diff.
      - name: Diff coverage (changed lines, 90% floor)
        if: github.ref != 'refs/heads/main'
        run: |
          base="${{ github.base_ref || 'main' }}"
          git fetch origin "$base"
          uv run diff-cover coverage.xml --compare-branch "origin/$base" --fail-under=90

  # Reduced subset on purpose: the lint/type gates are platform-independent and
  # already run (on both Python versions) in the ubuntu matrix above; this leg
  # exists to catch OS-specific breakage (path handling, file locking, atomic
  # renames), which only pytest exercises. Single job on the 3.13 floor - the
  # most likely real-user combo on Windows; version breadth stays on ubuntu.
  checks_windows:
    name: Checks (windows, py 3.13)
    runs-on: windows-latest
    env:
      # .python-version pins 3.14 (the dev version), and `uv run` RE-SYNCS the
      # venv against it - a --python flag on sync alone gets silently undone on
      # the next step. The job-level env holds every uv step on the floor.
      UV_PYTHON: "3.13"
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Python version (must be the 3.13 floor)
        run: uv run python -c "import sys; assert sys.version_info[:2] == (3, 13), sys.version"
      - name: Pytest
        run: uv run pytest tests/ -q

  # The compose example is documentation that can rot; docker compose config
  # parses + interpolates it (services, PUID/PGID defaults) without running anything.
  compose_example:
    name: Validate docker-compose.example.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: docker compose config
        run: |
          docker compose -f docker-compose.example.yml config >/dev/null 2>stderr.log || { cat stderr.log >&2; exit 1; }
          cat stderr.log >&2
          # Compose only warns when an interpolation var has no default; promote it.
          if grep -q "variable is not set" stderr.log; then exit 1; fi

  build_sdist_and_wheel:
    name: Build source distribution
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Versions listed at https://raw.githubusercontent.com/actions/python-versions/main/versions-manifest.json
        python-version: [
          "3.13",
          "3.14",
        ]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build package
        run: python -m build
