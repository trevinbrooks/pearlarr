name: Build

# Branches build through their PR only. A push run on the branch would double it.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Read-only by default. Publishing lives in release.yaml.
permissions:
  contents: read

# A newer push to the same PR supersedes the in-flight run. Main is exempt
# so every merge keeps its full record.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  checks:
    name: Checks (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Versions listed at https://raw.githubusercontent.com/actions/python-versions/main/versions-manifest.json
        python-version: [
          "3.13",
          "3.14",
        ]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: true
          # Full history so diff-cover can diff against the PR base branch.
          fetch-depth: 0
          # diff-cover git-fetches the base branch below, so the token must persist.
          persist-credentials: true
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}
      - name: Ruff (lint)
        run: uv run ruff check pearlarr/ tests/ scripts/
      - name: Ruff (format)
        run: uv run ruff format --check pearlarr/ tests/ scripts/
      - name: Basedpyright (src + tests + scripts, strict)
        run: uv run basedpyright pearlarr tests scripts
      # The type gate is vanilla pyright (pinned for reproducible CI). It reads
      # [tool.pyright] in pyproject.toml (typeCheckingMode = strict for the
      # package, tests/, AND scripts/) and resolves imports against the .venv
      # that `uv sync` just created.
      - name: Pyright (type check, strict)
        run: uvx pyright@1.1.411 pearlarr tests scripts
      - name: Pyrefly (type check)
        run: uv run pyrefly check pearlarr tests scripts --preset strict
      # Branch coverage with the fail_under floor from [tool.coverage.report].
      - name: Pytest (with coverage gate)
        run: uv run pytest tests/ --cov=pearlarr --cov-report=term-missing --cov-report=xml
      # Changed-line coverage gate: diff against the PR base. Skipped on main
      # pushes, which have no base to diff.
      - name: Diff coverage (changed lines, 90% floor)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF"
          uv run diff-cover coverage.xml --compare-branch "origin/$BASE_REF" --fail-under=90

  # Reduced subset on purpose: the lint/type gates are platform-independent and
  # already run (on both Python versions) in the ubuntu matrix above. This leg
  # exists to catch OS-specific breakage (path handling, file locking, atomic
  # renames), which only pytest exercises. Single job on the 3.13 floor - the
  # most likely real-user combo on Windows. Version breadth stays on ubuntu.
  checks_windows:
    name: Checks (windows, py 3.13)
    runs-on: windows-latest
    env:
      # .python-version pins 3.14 (the dev version), and `uv run` RE-SYNCS the
      # venv against it - a --python flag on sync alone gets silently undone on
      # the next step. The job-level env holds every uv step on the floor.
      UV_PYTHON: "3.13"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: true
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Python version (must be the 3.13 floor)
        run: uv run python -c "import sys; assert sys.version_info[:2] == (3, 13), sys.version"
      - name: Pytest
        run: uv run pytest tests/ -q

  # Docs gate: spelling ([tool.codespell] in pyproject.toml), markdown lint
  # (.markdownlint-cli2.yaml, generated files included on purpose), and local
  # link/anchor integrity (lychee.toml). External URLs are checked weekly by
  # links.yaml instead - a flaky remote host must not block a PR.
  docs:
    name: Docs (spelling, markdown, links)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Codespell
        run: uvx codespell@2.4.2 .
      - name: Markdownlint
        run: npx --yes markdownlint-cli2@0.23.0
      - name: Lychee (offline - local file links and anchors)
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          args: --offline --include-fragments --no-progress './**/*.md'
          fail: true

  # Static analysis of the workflow files themselves: SHA-pinned actions, least
  # privilege, no template injection, no credential persistence. Config and any
  # documented exceptions live in .github/zizmor.yml.
  zizmor:
    name: Zizmor (workflow static analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Zizmor
        env:
          GH_TOKEN: ${{ github.token }} # authenticates zizmor's online audits
        run: uvx zizmor@1.0.0 .github/workflows/

  # The compose example is documentation that can rot. Docker compose config
  # parses + interpolates it (services, PUID/PGID defaults) without running anything.
  compose_example:
    name: Validate docker-compose.example.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: docker compose config
        run: |
          docker compose -f docker-compose.example.yml config >/dev/null 2>stderr.log || { cat stderr.log >&2; exit 1; }
          cat stderr.log >&2
          # Compose only warns when an interpolation var has no default; promote it.
          if grep -q "variable is not set" stderr.log; then exit 1; fi

  build_sdist_and_wheel:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: true
          persist-credentials: false
      # Pure-Python build - one version suffices. release.yaml builds the real one.
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build package
        run: python -m build
