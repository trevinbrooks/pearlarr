name: Bug report
description: Something broke or behaved wrong
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What went wrong, and what you were doing when it did.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "The output of `pearlarr --version`."
    validations:
      required: true
  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - Docker
        - uv / pipx
        - pip
        - From source
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: paths
    attributes:
      label: pearlarr paths output
      description: "Paste the output of `pearlarr paths` (Docker: `docker compose run --rm pearlarr paths`)."
      render: text
  - type: textarea
    id: config
    attributes:
      label: Config
      description: Paste the output of `pearlarr config show` - it redacts API keys, passwords and webhook URLs by design, so it is safe to share. Never paste a raw config.yml.
      render: yaml
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Log excerpt
      description: "The relevant lines from the `logs/` folder in the data directory (`pearlarr paths` prints it). Typically `~/.local/share/pearlarr/logs` on Linux, `~/Library/Application Support/pearlarr/logs` on macOS, `/config/logs` in Docker. Log files never contain your keys or webhook URLs, so excerpts are safe to paste."
      render: text
