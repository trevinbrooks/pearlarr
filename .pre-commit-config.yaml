# Mirrors the `static-analysis` dependency-group: ruff for both linting and
# formatting. Enable locally with `pre-commit install` (the `dev` dependency-group
# provides pre-commit). Tool settings live in pyproject.toml.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        name: ruff lint
      - id: ruff-format
        name: ruff format
