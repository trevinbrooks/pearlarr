# Mirrors the `static-analysis` dependency-group: ruff for both linting and
# formatting. Enable locally with `pre-commit install` (the `dev` dependency-group
# provides pre-commit). Tool settings live in pyproject.toml.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        name: ruff lint
      - id: ruff-format
        name: ruff format
  - repo: local
    hooks:
      - id: gen-docs-check
        name: generated docs current
        entry: uv run python scripts/gen_docs.py --check
        language: system
        pass_filenames: false
